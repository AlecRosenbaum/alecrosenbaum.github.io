<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=800, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Hacker News comments reader optimized for e-ink devices">
  <meta name="robots" content="noindex, nofollow">
  <title>HN Comments - E-Ink</title>

<style>
  /* E-ink optimized styles - no animations, high contrast, minimal design */
  * {
    transition: none !important;
    animation: none !important;
    scroll-behavior: auto !important;
  }

  body {
    margin: 0;
    padding: 0;
    background: #ffffff;
    font-family: Georgia, serif;
    width: 800px;
    overflow-x: hidden;
  }

  .container {
    width: 100%;
    max-width: 800px;
    margin: 0;
    padding: 10px;
    background: #ffffff;
    color: #1e1e1e;
    font-family: Georgia, serif;
    min-height: 550px;
  }

  .header {
    margin-bottom: 15px;
    padding-bottom: 10px;
    border-bottom: 2px solid #1e1e1e;
    text-align: center;
    line-height: 30px;
  }

  .header > * {
    display: inline-block;
    vertical-align: middle;
  }

  .back-button {
    min-width: 60px;
    height: 30px;
    padding: 6px 10px;
    background: #ffffff;
    color: #1e1e1e;
    border: 2px solid #1e1e1e;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    vertical-align: middle;
  }

  .back-button:active,
  .back-button:focus {
    background: #1e1e1e;
    color: #ffffff;
    outline: none;
  }

  .page-title {
    font-size: 18px;
    font-weight: bold;
    margin: 0 8px;
    display: inline-block;
    vertical-align: middle;
  }

  .comment-count {
    font-size: 13px;
    color: #666;
    display: inline-block;
    vertical-align: middle;
    padding: 0 5px;
  }

  .refresh-button {
    min-width: 36px;
    height: 30px;
    padding: 6px 10px;
    margin-left: 8px;
    background: #ffffff;
    color: #1e1e1e;
    border: 2px solid #1e1e1e;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    display: inline-block;
    vertical-align: middle;
  }

  .refresh-button:active,
  .refresh-button:focus {
    background: #1e1e1e;
    color: #ffffff;
    outline: none;
  }

  .refresh-button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .story-section {
    margin-bottom: 20px;
    padding: 15px;
    border: 2px solid #1e1e1e;
    background: #f8f8f8;
  }

  .story-title {
    font-size: 18px;
    line-height: 1.3;
    margin: 0 0 8px 0;
    font-weight: 600;
  }

  .story-title a {
    color: #1e1e1e;
    text-decoration: none;
  }

  .story-title a:focus,
  .story-title a:active {
    text-decoration: underline;
  }

  .story-meta {
    font-size: 12px;
    color: #555;
    margin-bottom: 8px;
  }

  .story-meta span {
    margin-right: 10px;
  }

  .story-text {
    font-size: 16px;
    line-height: 1.5;
    margin-top: 10px;
    white-space: pre-wrap;
  }

  .comments-section {
    margin: 10px 0;
  }

  .comment {
    margin: 8px 0;
    padding: 8px;
    border: 1px solid #ccc;
    background: #ffffff;
    position: relative;
    padding-right: 60px; /* Space for collapse button */
  }

  .comment-nested {
    margin-left: 20px;
    border-left: 2px solid #ddd;
  }

  .comment-header {
    font-size: 12px;
    color: #666;
    margin-bottom: 5px;
  }

  .comment-author {
    font-weight: 600;
    color: #1e1e1e;
  }

  .comment-text {
    font-size: 16px;
    line-height: 1.5;
    margin: 5px 0;
    word-wrap: break-word;
  }

  .comment-text p {
    margin: 8px 0;
  }

  .comment-text a {
    color: #1e1e1e;
    text-decoration: underline;
  }

  .comment-text pre {
    background: #f0f0f0;
    padding: 5px;
    overflow-x: auto;
    font-size: 13px;
  }

  .comment-text code {
    background: #f0f0f0;
    padding: 1px 3px;
    font-size: 13px;
  }

  .collapse-button {
    position: absolute;
    right: 8px;
    top: 8px;
    padding: 6px 10px;
    background: #ffffff;
    border: 2px solid #1e1e1e;
    font-size: 14px;
    font-weight: 600;
    color: #1e1e1e;
    cursor: pointer;
    min-width: 40px;
    text-align: center;
  }

  .collapse-button:active,
  .collapse-button:focus {
    background: #1e1e1e;
    color: #ffffff;
  }

  .collapsed .comment-text,
  .collapsed .comment-replies {
    display: none;
  }

  .loading-message,
  .error-message {
    text-align: center;
    padding: 40px;
    font-size: 14px;
    min-height: 200px;
    line-height: 200px;
  }

  .error-message {
    color: #d00;
    border: 2px solid #d00;
    margin: 20px 0;
    background: #fff5f5;
  }

  .load-more-button {
    display: block;
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    background: #f8f8f8;
    border: 1px solid #1e1e1e;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  .load-more-button:active,
  .load-more-button:focus {
    background: #1e1e1e;
    color: #ffffff;
  }

  @media screen and (max-width: 800px) {
    body {
      width: 100%;
    }

    .container {
      padding: 8px;
    }

    .comment-nested {
      margin-left: 12px;
    }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <a href="/hn" class="back-button">← Back</a>
    <h1 class="page-title">Comments</h1>
    <span class="comment-count" id="comment-count"></span>
    <button class="refresh-button" onclick="refreshStory()">↻</button>
  </div>

  <div id="story-section" class="story-section">
    <div class="loading-message">Loading story...</div>
  </div>

  <div id="comments-section" class="comments-section">
    <div class="loading-message">Loading comments...</div>
  </div>
</div>

<script>
  // Configuration
  var COMMENTS_PER_BATCH = 10; // Load comments in batches for performance
  var MAX_DEPTH = 5; // Maximum nesting depth for comments

  // State
  var storyData = null;
  var allComments = {};
  var isLoading = false;
  var storyId = null;

  // Initialize on page load
  document.addEventListener('DOMContentLoaded', function() {
    // Get story ID from URL - ES5 compatible
    var url = window.location.search;
    var match = url.match(/[?&]id=([^&]+)/);
    if (match && match[1]) {
      storyId = match[1];
    }

    if (!storyId) {
      showError('No story ID provided');
      return;
    }

    loadStory(storyId);
  });

  // Load story and comments
  function loadStory(id) {
    if (isLoading) return;

    isLoading = true;
    updateLoadingState();

    // Fetch story data
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'https://hacker-news.firebaseio.com/v0/item/' + id + '.json', true);
    xhr.onreadystatechange = function() {
      if (xhr.readyState === 4) {
        if (xhr.status === 200) {
          storyData = JSON.parse(xhr.responseText);

          if (!storyData) {
            showError('Story not found');
            isLoading = false;
            updateLoadingState();
            return;
          }

          // Display story
          displayStory();

          // Update comment count
          var commentCount = storyData.descendants || 0;
          var commentText = commentCount + ' comment' + (commentCount !== 1 ? 's' : '');
          document.getElementById('comment-count').textContent = commentText;

          // Load comments if they exist
          if (storyData.kids && storyData.kids.length > 0) {
            loadComments(storyData.kids, null, 0);
          } else {
            document.getElementById('comments-section').innerHTML = '<div class="comment">No comments yet</div>';
          }

          isLoading = false;
          updateLoadingState();
        } else {
          console.error('Error loading story');
          showError('Failed to load story');
          isLoading = false;
          updateLoadingState();
        }
      }
    };
    xhr.send();
  }

  // Display story details
  function displayStory() {
    var storySection = document.getElementById('story-section');
    var timeAgo = getTimeAgo(storyData.time);

    var storyHtml = '<h2 class="story-title">';

    if (storyData.url) {
      storyHtml += '<a href="' + storyData.url + '" target="_blank" rel="noopener">' +
                   escapeHtml(storyData.title) + '</a>';
    } else {
      storyHtml += escapeHtml(storyData.title);
    }

    storyHtml += '</h2>' +
      '<div class="story-meta">' +
      '<span class="score">' + storyData.score + 'p</span>' +
      '<span>• ' + storyData.by + '</span>' +
      '<span>• ' + timeAgo + '</span>';

    if (storyData.url) {
      storyHtml += '<span>• ' + getDomain(storyData.url) + '</span>';
    }

    storyHtml += '</div>';

    // Add story text if it exists (for Ask HN, etc.)
    if (storyData.text) {
      storyHtml += '<div class="story-text">' + sanitizeHtml(storyData.text) + '</div>';
    }

    storySection.innerHTML = storyHtml;
  }

  // Load comments recursively
  function loadComments(commentIds, parentElement, depth) {
    if (!commentIds || commentIds.length === 0) return;
    if (!depth) depth = 0;
    if (depth > MAX_DEPTH) return;

    var container = parentElement || document.getElementById('comments-section');

    // Clear loading message if this is the root level
    if (!parentElement) {
      container.innerHTML = '';
    }

    // Load comments in batches
    var batchIndex = 0;

    function loadBatch() {
      if (batchIndex >= commentIds.length) return;

      var batch = commentIds.slice(batchIndex, batchIndex + COMMENTS_PER_BATCH);
      batchIndex += COMMENTS_PER_BATCH;

      var completed = 0;
      var comments = new Array(batch.length);

      function checkBatchComplete() {
        completed++;
        if (completed === batch.length) {
          // Process all comments in this batch
          for (var i = 0; i < comments.length; i++) {
            var comment = comments[i];
            if (!comment || comment.deleted || comment.dead) continue;

            var commentDiv = createCommentElement(comment, depth);
            container.appendChild(commentDiv);

            // Load nested comments if they exist
            if (comment.kids && comment.kids.length > 0) {
              var repliesDiv = document.createElement('div');
              repliesDiv.className = 'comment-replies';
              commentDiv.appendChild(repliesDiv);

              // Add load more button for large threads
              if (comment.kids.length > 5 && depth < MAX_DEPTH - 1) {
                (function(kids, div) {
                  var loadMoreBtn = document.createElement('button');
                  loadMoreBtn.className = 'load-more-button';
                  loadMoreBtn.textContent = 'Load ' + kids.length + ' replies';
                  loadMoreBtn.onclick = function() {
                    loadMoreBtn.textContent = 'Loading...';
                    loadMoreBtn.disabled = true;
                    loadComments(kids, div, depth + 1);
                    loadMoreBtn.parentNode.removeChild(loadMoreBtn);
                  };
                  div.appendChild(loadMoreBtn);
                })(comment.kids, repliesDiv);
              } else {
                loadComments(comment.kids, repliesDiv, depth + 1);
              }
            }
          }

          // Load next batch
          loadBatch();
        }
      }

      // Fetch each comment in the batch
      for (var i = 0; i < batch.length; i++) {
        (function(index) {
          var xhr = new XMLHttpRequest();
          xhr.open('GET', 'https://hacker-news.firebaseio.com/v0/item/' + batch[index] + '.json', true);
          xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
              if (xhr.status === 200) {
                comments[index] = JSON.parse(xhr.responseText);
              } else {
                comments[index] = null;
              }
              checkBatchComplete();
            }
          };
          xhr.send();
        })(i);
      }
    }

    loadBatch();
  }

  // Create comment element
  function createCommentElement(comment, depth) {
    var timeAgo = getTimeAgo(comment.time);

    var commentDiv = document.createElement('div');
    commentDiv.className = depth > 0 ? 'comment comment-nested' : 'comment';
    commentDiv.id = 'comment-' + comment.id;

    commentDiv.innerHTML = '<button class="collapse-button" onclick="toggleCollapse(\'' + comment.id + '\')">[−]</button>' +
      '<div class="comment-header">' +
      '<span class="comment-author">' + comment.by + '</span>' +
      '<span>• ' + timeAgo + '</span>' +
      '</div>' +
      '<div class="comment-text">' + sanitizeHtml(comment.text || '') + '</div>';

    return commentDiv;
  }

  // Toggle comment collapse
  function toggleCollapse(commentId) {
    var comment = document.getElementById('comment-' + commentId);
    if (comment) {
      // Fallback for browsers without classList
      var className = ' ' + comment.className + ' ';
      var isCollapsed = className.indexOf(' collapsed ') > -1;

      if (isCollapsed) {
        comment.className = comment.className.replace(/\bcollapsed\b/g, '').replace(/\s+/g, ' ').trim();
      } else {
        comment.className += ' collapsed';
      }

      var buttons = comment.getElementsByClassName('collapse-button');
      if (buttons.length > 0) {
        var button = buttons[0];
        button.textContent = !isCollapsed ? '[+]' : '[−]';
      }
    }
  }

  // Refresh story and comments
  function refreshStory() {
    if (isLoading || !storyId) return;
    loadStory(storyId);
  }

  // Update loading state
  function updateLoadingState() {
    var refreshBtns = document.getElementsByClassName('refresh-button');
    if (refreshBtns.length > 0) {
      var refreshBtn = refreshBtns[0];
      refreshBtn.disabled = isLoading;
      refreshBtn.textContent = isLoading ? '⟳' : '↻';
    }
  }

  // Show error message
  function showError(message) {
    document.getElementById('comments-section').innerHTML = '<div class="error-message">' +
      message + '<br>' +
      '<button onclick="window.location.href=\'/hn\'" style="margin-top: 10px;">Back to Stories</button>' +
      '</div>';
  }

  // Utility functions
  function getTimeAgo(unixTime) {
    var seconds = Math.floor(Date.now() / 1000 - unixTime);
    var minutes = Math.floor(seconds / 60);
    var hours = Math.floor(minutes / 60);
    var days = Math.floor(hours / 24);

    if (days > 0) return days + 'd';
    if (hours > 0) return hours + 'h';
    if (minutes > 0) return minutes + 'm';
    return 'now';
  }

  function getDomain(url) {
    try {
      // Try using URL constructor if available
      if (typeof URL !== 'undefined') {
        var u = new URL(url);
        return u.hostname.replace('www.', '');
      } else {
        // Fallback for old browsers
        var match = url.match(/^https?:\/\/([^\/]+)/);
        if (match && match[1]) {
          return match[1].replace('www.', '');
        }
        return '';
      }
    } catch (e) {
      // Additional fallback using regex
      var match = url.match(/^https?:\/\/([^\/]+)/);
      if (match && match[1]) {
        return match[1].replace('www.', '');
      }
      return '';
    }
  }

  function escapeHtml(text) {
    var map = {
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#039;'
    };
    return text.replace(/[&<>"']/g, function(m) { return map[m]; });
  }

  function sanitizeHtml(html) {
    // Basic HTML sanitization - convert HN's HTML to safe display
    return html
      .replace(/<p>/g, '<p>')
      .replace(/<\/p>/g, '</p>')
      .replace(/<a\s+href="([^"]+)"[^>]*>/g, '<a href="$1" target="_blank" rel="noopener">')
      .replace(/<pre><code>/g, '<pre>')
      .replace(/<\/code><\/pre>/g, '</pre>')
      .replace(/<code>/g, '<code>')
      .replace(/<\/code>/g, '</code>')
      .replace(/<i>/g, '<i>')
      .replace(/<\/i>/g, '</i>');
  }
</script>

</body>
</html>
