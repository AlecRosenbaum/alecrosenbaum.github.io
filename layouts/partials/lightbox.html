{{- /* Lightbox for full-screen image viewing with prev/next navigation */ -}}

<div id="lightbox" class="lightbox" aria-hidden="true">
  <button class="lightbox-close" aria-label="Close lightbox">&times;</button>
  <button class="lightbox-prev" aria-label="Previous image">&lsaquo;</button>
  <button class="lightbox-next" aria-label="Next image">&rsaquo;</button>
  <div class="lightbox-content">
    <img src="" alt="" class="lightbox-image">
  </div>
  <div class="lightbox-counter"></div>
</div>

<style>
.lightbox {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.95);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  touch-action: pan-y pinch-zoom;
}

.lightbox.active {
  display: flex;
}

.lightbox-content {
  max-width: 90vw;
  max-height: 85vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px;
}

.lightbox-image {
  max-width: 100%;
  max-height: 85vh;
  object-fit: contain;
  user-select: none;
  -webkit-user-drag: none;
}

.lightbox-close,
.lightbox-prev,
.lightbox-next {
  position: absolute;
  background: rgba(0, 0, 0, 0.3);
  border: none;
  color: white;
  cursor: pointer;
  opacity: 0.8;
  transition: opacity 0.2s, background 0.2s;
  -webkit-tap-highlight-color: transparent;
}

.lightbox-close:hover,
.lightbox-prev:hover,
.lightbox-next:hover {
  opacity: 1;
  background: rgba(0, 0, 0, 0.5);
}

.lightbox-close {
  top: 10px;
  right: 10px;
  font-size: 2rem;
  padding: 8px 16px;
  border-radius: 4px;
  z-index: 1001;
}

.lightbox-prev,
.lightbox-next {
  top: 50%;
  transform: translateY(-50%);
  font-size: 2.5rem;
  padding: 20px 12px;
  border-radius: 4px;
}

.lightbox-prev {
  left: 10px;
}

.lightbox-next {
  right: 10px;
}

.lightbox-counter {
  position: absolute;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  color: white;
  font-size: 0.9rem;
  opacity: 0.8;
  background: rgba(0, 0, 0, 0.3);
  padding: 6px 12px;
  border-radius: 4px;
}

/* Mobile styles */
@media (max-width: 768px) {
  .lightbox-content {
    max-width: 100vw;
    max-height: 80vh;
    padding: 5px;
  }

  .lightbox-image {
    max-height: 80vh;
  }

  .lightbox-close {
    top: 5px;
    right: 5px;
    font-size: 1.5rem;
    padding: 10px 14px;
  }

  .lightbox-prev,
  .lightbox-next {
    font-size: 2rem;
    padding: 30px 8px;
  }

  .lightbox-prev {
    left: 0;
    border-radius: 0 4px 4px 0;
  }

  .lightbox-next {
    right: 0;
    border-radius: 4px 0 0 4px;
  }

  .lightbox-counter {
    bottom: 10px;
    font-size: 0.85rem;
  }
}
</style>

<script>
(function() {
  const lightbox = document.getElementById('lightbox');
  if (!lightbox) return;

  const lightboxImg = lightbox.querySelector('.lightbox-image');
  const counter = lightbox.querySelector('.lightbox-counter');
  const closeBtn = lightbox.querySelector('.lightbox-close');
  const prevBtn = lightbox.querySelector('.lightbox-prev');
  const nextBtn = lightbox.querySelector('.lightbox-next');

  // Collect all images from galleries and post-images
  const images = [];
  const imageElements = document.querySelectorAll('.post-content .gallery-item a, .post-content .post-image a');

  imageElements.forEach(a => {
    if (a.href.match(/\.(jpg|jpeg|png|gif|webp)$/i)) {
      images.push({
        src: a.href,
        alt: a.querySelector('img')?.alt || ''
      });
    }
  });

  // Also collect images not wrapped in links
  document.querySelectorAll('.post-content .post-image picture, .post-content .gallery-item picture').forEach(picture => {
    if (!picture.closest('a')) {
      const img = picture.querySelector('img');
      if (img && img.src) {
        const sources = picture.querySelectorAll('source');
        let src = img.src;
        sources.forEach(source => {
          const srcset = source.srcset;
          if (srcset && !source.type?.includes('webp')) {
            const largest = srcset.split(',').pop().trim().split(' ')[0];
            if (largest) src = largest;
          }
        });
        images.push({ src, alt: img.alt || '' });
      }
    }
  });

  if (images.length === 0) return;

  let currentIndex = 0;

  function openLightbox(index) {
    currentIndex = index;
    updateLightbox();
    lightbox.classList.add('active');
    lightbox.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('active');
    lightbox.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
  }

  function updateLightbox() {
    lightboxImg.src = images[currentIndex].src;
    lightboxImg.alt = images[currentIndex].alt;
    counter.textContent = `${currentIndex + 1} / ${images.length}`;
    prevBtn.style.display = images.length > 1 ? '' : 'none';
    nextBtn.style.display = images.length > 1 ? '' : 'none';
  }

  function showPrev() {
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    updateLightbox();
  }

  function showNext() {
    currentIndex = (currentIndex + 1) % images.length;
    updateLightbox();
  }

  // Click handlers for gallery/post images
  imageElements.forEach(a => {
    if (a.href.match(/\.(jpg|jpeg|png|gif|webp)$/i)) {
      a.addEventListener('click', function(e) {
        e.preventDefault();
        const src = this.href;
        const index = images.findIndex(img => img.src === src);
        openLightbox(index >= 0 ? index : 0);
      });
    }
  });

  // Click handlers for unwrapped images
  document.querySelectorAll('.post-content .post-image picture, .post-content .gallery-item picture').forEach(picture => {
    if (!picture.closest('a')) {
      picture.style.cursor = 'pointer';
      picture.addEventListener('click', function() {
        const img = this.querySelector('img');
        if (img) {
          const index = images.findIndex(i => i.alt === img.alt);
          openLightbox(index >= 0 ? index : 0);
        }
      });
    }
  });

  closeBtn.addEventListener('click', closeLightbox);
  prevBtn.addEventListener('click', showPrev);
  nextBtn.addEventListener('click', showNext);

  // Close on background click
  lightbox.addEventListener('click', function(e) {
    if (e.target === lightbox) {
      closeLightbox();
    }
  });

  // Keyboard navigation
  document.addEventListener('keydown', function(e) {
    if (!lightbox.classList.contains('active')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') showPrev();
    if (e.key === 'ArrowRight') showNext();
  });

  // Touch swipe support
  let touchStartX = 0;
  let touchStartY = 0;
  let touchEndX = 0;
  let touchEndY = 0;

  lightbox.addEventListener('touchstart', function(e) {
    touchStartX = e.changedTouches[0].screenX;
    touchStartY = e.changedTouches[0].screenY;
  }, { passive: true });

  lightbox.addEventListener('touchend', function(e) {
    touchEndX = e.changedTouches[0].screenX;
    touchEndY = e.changedTouches[0].screenY;
    handleSwipe();
  }, { passive: true });

  function handleSwipe() {
    const deltaX = touchEndX - touchStartX;
    const deltaY = touchEndY - touchStartY;
    const minSwipeDistance = 50;

    // Only handle horizontal swipes (ignore vertical scrolling)
    if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > minSwipeDistance) {
      if (deltaX > 0) {
        showPrev();
      } else {
        showNext();
      }
    }
  }
})();
</script>
